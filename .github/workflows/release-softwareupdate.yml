name: Release softwareupdate

on:
  push:
    branches:
      - main
    paths:
      - 'softwareupdate/**'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binaries
        run: |
          cd softwareupdate
          make deps
          make build

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: softwareupdate-binaries
          path: |
            softwareupdate/softwareupdate-x86_64.ext
            softwareupdate/softwareupdate-arm64.ext
            softwareupdate/softwareupdate.ext

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Fleet Extensions Release
          body: |
            This release includes updated binaries for the following extensions:

            | Extension                 | Built in this release |
            |---------------------------|----------------------|
            | apple_network_quality     |                      |
            | brew_list                 |                      |
            | brew_outdated             |                      |
            | homebrew_info             |                      |
            | local_network_permissions |                      |
            | macos_compatibility       |                      |
            | mise                      |                      |
            | msft_defender             |                      |
            | nuget_packages            |                      |
            | santa                     |                      |
            | secureboot_cert_update    |                      |
            | snap_packages             |                      |
            | softwareupdate            | ✅                    |
            | system_profiler           |                      |
            | ubuntu_pro                |                      |

            See attached assets for binaries.
          files: |
            softwareupdate/softwareupdate-x86_64.ext
            softwareupdate/softwareupdate-arm64.ext
            softwareupdate/softwareupdate.ext
          draft: false
          prerelease: false
